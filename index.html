<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CanvasFlow AI Studio</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%23121212'/%3E%3Cpath d='M148 228 C188 228, 204 268, 244 268' stroke='%2322d3ee' stroke-width='10' stroke-linecap='round' fill='none'/%3E%3Cpath d='M268 308 C308 308, 324 228, 364 228' stroke='%2338bdf8' stroke-width='10' stroke-linecap='round' fill='none'/%3E%3Crect x='88' y='188' width='96' height='72' rx='18' fill='%231e1e1e' stroke='%2322d3ee' stroke-width='6'/%3E%3Crect x='208' y='268' width='96' height='72' rx='18' fill='%231e1e1e' stroke='%2322d3ee' stroke-width='6'/%3E%3Crect x='328' y='188' width='96' height='72' rx='18' fill='%23242424' stroke='%2338bdf8' stroke-width='6'/%3E%3Ccircle cx='372' cy='372' r='16' fill='%2322d3ee'/%3E%3C/svg%3E"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #121212;
        color: #e8e6e3;
      }
      #root {
        height: 100%;
      }
      /* ── 启动动画 CSS（内联确保 JS 加载前立即可见）── */
      #app-boot-splash {
        position: fixed;
        inset: 0;
        z-index: 100000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #121212;
        color: #e8e6e3;
        transition: opacity 0.42s ease, visibility 0.42s ease;
      }
      #app-boot-splash.app-boot-splash--exiting {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .app-boot-splash__inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        user-select: none;
      }
      .app-boot-splash__mark {
        position: relative;
        width: 56px;
        height: 56px;
      }
      .app-boot-splash__ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.08);
        border-top-color: #38bdf8;
        animation: app-boot-spin 0.9s linear infinite;
      }
      .app-boot-splash__core {
        position: absolute;
        inset: 14px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, rgba(56, 189, 248, 0.35), rgba(18, 18, 18, 0.2) 68%);
        box-shadow: 0 0 28px rgba(56, 189, 248, 0.22);
        animation: app-boot-pulse 1.6s ease-in-out infinite;
      }
      @keyframes app-boot-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes app-boot-pulse {
        0%, 100% { opacity: 0.72; transform: scale(0.96); }
        50% { opacity: 1; transform: scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-boot-splash__ring,
        .app-boot-splash__core {
          animation: none;
        }
        #app-boot-splash {
          transition-duration: 0.15s;
        }
      }
    </style>
  </head>
  <body>
    <div
      id="app-boot-splash"
      role="status"
      aria-live="polite"
      aria-busy="true"
      aria-label="正在加载"
    >
      <div class="app-boot-splash__inner">
        <div class="app-boot-splash__mark" aria-hidden="true">
          <span class="app-boot-splash__ring"></span>
          <span class="app-boot-splash__core"></span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
